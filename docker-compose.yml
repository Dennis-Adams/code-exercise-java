version: '3.8'
services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: your_db_user
      POSTGRES_PASSWORD: your_db_password
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432" 

  # Spring Boot Backend
  backend:
    build: 
      context: . # Looks for the Dockerfile in the root directory
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/url_shortener
      - SPRING_DATASOURCE_USERNAME=your_db_user
      - SPRING_DATASOURCE_PASSWORD=your_db_password
    depends_on:
      - db

  # React Frontend
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173" # Change to "5173:5173" if using Vite
    depends_on:
      - backend

